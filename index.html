<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クラス予約受付フォーム</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f4f8; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #4a5568; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        #lunch-section { display: none; background: #f0fdf4; padding: 15px; border-radius: 8px; border: 1px solid #bbf7d0; }
        .radio-group { display: flex; gap: 15px; }
        .radio-label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: normal; }
        .btn-submit { width: 100%; background: #10b981; color: white; border: none; padding: 14px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background: #059669; }
        .loading { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 15px; display: none; }
        .deadline-note { font-size: 13px; color: #ef4444; margin-top: -5px; margin-bottom: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>👤 クラス予約受付</h2>
    <div class="deadline-note">※ 各日程とも、前日の午前10:00に入力を締め切らせていただきます。</div>
    <div id="loading-text" class="loading">最新の空き状況を確認中...</div>
    <form id="reservation-form">
        <div class="form-group">
            <label for="user-name">お名前（必須）</label>
            <input type="text" id="user-name" placeholder="山田 太郎" required>
        </div>

        <div class="form-group">
            <label for="date-select">① 日付を選択</label>
            <select id="date-select" required>
                <option value="">読み込み中...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="class-type">② クラスを選択</label>
            <select id="class-type" required disabled>
                <option value="">まず日付を選択してください</option>
            </select>
        </div>

        <div class="form-group">
            <label for="time-slot">③ 時間帯を選択（各枠2組まで）</label>
            <select id="time-slot" required disabled>
                <option value="">まずクラスを選択してください</option>
            </select>
        </div>

        <div class="form-group" id="lunch-section">
            <label>④ 昼食のご利用</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="lunch" value="食べる"> 食べる</label>
                <label class="radio-label"><input type="radio" name="lunch" value="食べない"> 食べない</label>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">予約を確定する</button>
    </form>
</div>

<script>
    // ⚠️ 下の "" の間に、あなたのGoogle URLを貼り付けてください
    const APP_URL = "https://script.google.com/macros/s/AKfycbynOpCMUSdmgn-BFBS-bMh42nTeKqhhptkXTKRMpeJoj2i1gRqMzZ36KH6jmZBV5gIH/exec";

    let availableDates = [];
    let availableTimes = [];
    let reservations = [];

    const dateSelect = document.getElementById('date-select');
    const classSelect = document.getElementById('class-type');
    const timeSelect = document.getElementById('time-slot');
    const lunchSection = document.getElementById('lunch-section');
    const lunchRadios = document.querySelectorAll('input[name="lunch"]');

    async function loadNetworkData() {
        document.getElementById('loading-text').style.display = 'block';
        try {
            const res = await fetch(APP_URL);
            const data = await res.json();
            availableDates = data.dates || [];
            availableTimes = data.times || ["09:30～11:00", "11:30～12:30", "16:00～17:00"];
            reservations = data.reservations || [];
            updateDateSelect();
        } catch (e) {
            alert("データの同期に失敗しました。");
        }
        document.getElementById('loading-text').style.display = 'none';
    }

    function isPastDeadline(dateStr) {
        const now = new Date();
        const deadlineDate = new Date(dateStr + "T10:00:00");
        deadlineDate.setDate(deadlineDate.getDate() - 1);
        return now >= deadlineDate;
    }

    function updateDateSelect() {
        dateSelect.innerHTML = '';
        const validDates = availableDates.filter(date => !isPastDeadline(date));

        if(validDates.length === 0) {
            dateSelect.innerHTML = '<option value="">-- 受付中の日程はありません --</option>';
            return;
        }
        
        dateSelect.innerHTML = '<option value="">日付を選択してください</option>';
        validDates.forEach(date => {
            const option = document.createElement('option');
            option.value = date; option.textContent = date;
            dateSelect.appendChild(option);
        });
    }

    function resetForm() {
        document.getElementById('user-name').value = '';
        dateSelect.value = '';
        classSelect.innerHTML = '<option value="">まず日付を選択してください</option>';
        classSelect.disabled = true;
        timeSelect.innerHTML = '<option value="">まずクラスを選択してください</option>';
        timeSelect.disabled = true;
        lunchSection.style.display = 'none';
    }

    dateSelect.addEventListener('change', function() {
        if(!this.value) { classSelect.disabled = true; timeSelect.disabled = true; lunchSection.style.display = 'none'; return; }
        classSelect.disabled = false;
        classSelect.innerHTML = `
            <option value="">クラスを選択してください</option>
            <option value="カモミール">カモミールクラス</option>
            <option value="メリッサ">メリッサクラス</option>
            <option value="マジョラム">マジョラムクラス</option>
        `;
        timeSelect.innerHTML = '<option value="">まずクラスを選択してください</option>';
        timeSelect.disabled = true;
        lunchSection.style.display = 'none';
    });

    classSelect.addEventListener('change', function() {
        const selectedDate = dateSelect.value;
        const selectedClass = this.value;
        timeSelect.innerHTML = '<option value="">時間帯を選択してください</option>';
        if (!selectedClass) { timeSelect.disabled = true; lunchSection.style.display = 'none'; return; }
        timeSelect.disabled = false;

        availableTimes.forEach(timeStr => {
            const currentCount = reservations.filter(r => r.date === selectedDate && r.className === selectedClass && r.time === timeStr).length;
            const remaining = 2 - currentCount;
            const option = document.createElement('option');
            option.value = timeStr;
            if (remaining <= 0) {
                option.text = `${timeStr} (満席：2組埋まっています)`;
                option.disabled = true;
            } else {
                option.text = `${timeStr} (空き：残り ${remaining} 組)`;
            }
            timeSelect.appendChild(option);
        });
    });

    timeSelect.addEventListener('change', function() {
        if (this.value.includes('11:30')) {
            lunchSection.style.display = 'block';
            lunchRadios.forEach(r => r.required = true);
        } else {
            lunchSection.style.display = 'none';
            lunchRadios.forEach(r => r.required = false);
        }
    });

    document.getElementById('reservation-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.innerText = "送信中...";

        const name = document.getElementById('user-name').value.trim();
        const date = dateSelect.value;
        const className = classSelect.value;
        const time = timeSelect.value;
        let lunchText = time.includes('11:30') ? document.querySelector('input[name="lunch"]:checked').value : 'なし';

        if (isPastDeadline(date)) {
            alert("申し訳ありません、この日程は前日10時の締め切り時間を過ぎたため受付終了しました。");
            loadNetworkData();
            submitBtn.disabled = false; submitBtn.innerText = "予約を確定する";
            return;
        }

        try {
            const resGet = await fetch(APP_URL);
            const currentData = await resGet.json();
            const checkReservations = currentData.reservations || [];
            
            const currentCount = checkReservations.filter(r => r.date === date && r.className === className && r.time === time).length;
            if(currentCount >= 2) {
                alert("申し訳ありません、直前に満席になってしまいました。別の日時を選択してください。");
                loadNetworkData();
                submitBtn.disabled = false; submitBtn.innerText = "予約を確定する";
                return;
            }

            await fetch(APP_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'addReservation',
                    name: name,
                    date: date,
                    className: className,
                    time: time,
                    lunch: lunchText
                })
            });

            alert(`予約が確定しました！\nお名前: ${name}様`);
            resetForm();
            loadNetworkData();
        } catch(err) {
            alert("通信エラーが発生しました。");
        }
        submitBtn.disabled = false; submitBtn.innerText = "予約を確定する";
    });

    loadNetworkData();
</script>
</body>
</html>
